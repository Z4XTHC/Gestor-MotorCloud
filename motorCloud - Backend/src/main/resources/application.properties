spring.application.name=motorCloud

# Versión actual del sistema (actualizar en cada release)
app.version=1.0.0
# Repositorio GitHub donde se publican los releases (formato: owner/repo)
app.github.repo=TU_USUARIO/motorCloud

# Configuración del servidor
server.port=8081

# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/motorCloud_db?createDatabaseIfNotExist=true
spring.datasource.username=root
#spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.h2.console.path=/h2-console

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create
#spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# subida de archivos
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# EMAIL CONFIG
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=mango.store.thc@gmail.com
#spring.mail.password=iachamgjnmenbxxd
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# Interfaz universal para escuchar en todas las interfaces de red disponibles.
server.address=0.0.0.0

# Cookies de sesión cross-origin (necesario para ngrok / dominios distintos con withCredentials)
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true


